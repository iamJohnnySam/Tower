<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0f1623"/>
  <!-- mast -->
  <line x1="16" y1="5" x2="16" y2="22" stroke="#4dabf7" stroke-width="2" stroke-linecap="round"/>
  <!-- cross-bars, narrowing toward top -->
  <line x1="8"  y1="21" x2="24" y2="21" stroke="#4dabf7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="#4dabf7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="11" x2="20" y2="11" stroke="#4dabf7" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  <!-- legs -->
  <line x1="8"  y1="21" x2="5"  y2="28" stroke="#4dabf7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="27" y2="28" stroke="#4dabf7" stroke-width="1.8" stroke-linecap="round"/>
  <!-- signal arcs -->
  <path d="M10.5 7.5 A7.5 7.5 0 0 1 21.5 7.5" stroke="#4dabf7" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M13 5 A4.5 4.5 0 0 1 19 5" stroke="#4dabf7" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.38"/>
</svg>
